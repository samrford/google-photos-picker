version: "2"

run:
  timeout: 3m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - revive
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - revive

formatters:
  enable:
    - gofmt
    - goimports
